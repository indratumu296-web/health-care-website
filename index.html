<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>INDRA HOSPITAL</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            overflow-x:hidden;
        }

        /* Header */
        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 50px;
            background:rgba(0,102,204,0.9);
            position:fixed;
            width:100%;
            top:0;
            z-index:1000;
        }

        .logo{
            display:flex;
            align-items:center;
        }

        .logo img{
            width:60px;
            height:60px;
            margin-right:15px;
            border-radius:50%;
            background:white;
        }

        .logo h1{
            color:white;
            font-size:28px;
        }

        nav ul{
            list-style:none;
            display:flex;
        }

        nav ul li{
            margin-left:25px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
        }

        nav ul li a:hover{
            color:yellow;
        }

        /* Hero Section */
        .hero{
            height:100vh;
            background:url("images/ChatGPT Image Jun 26, 2026, 03_36_14 PM.png") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            position:relative;
        }

        .hero::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
        }

        .hero-content{
            position:relative;
            z-index:1;
        }

        .hero-content h2{
            font-size:55px;
            margin-bottom:20px;
        }

        .hero-content p{
            font-size:24px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:15px 35px;
            background:#00b894;
            color:white;
            text-decoration:none;
            font-size:20px;
            border-radius:8px;
        }

        .btn:hover{
            background:#009970;
        }
    </style>

</head>

<header>

    <div class="logo">

    <nav>

            <li><a href="index.html">Home</a></li>

            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="appointment.html">Appointment</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

</header>

<section class="hero">

    <div class="hero-content">
        <h2>Welcome to Indra hospital</h2>

        <p>
            Compassionate Care, Advanced Medicine, Trusted Professionals.
        </p>

         <a href="appointment.html" class="btn">Book Appointment</a>


          
        
    </div>

</section>
