<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Appointment | Indra Hospital</title>

    <meta name="description" content="Book an appointment with experienced doctors at Indra Hospital.">
    <meta name="keywords" content="Hospital Appointment, Doctor Appointment, Indra Hospital">

    <style>

         *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            min-height:100vh;
            background: linear-gradient(
                rgba(10, 22, 40, 0.92),
                rgba(10, 22, 40, 0.92)
            ),
            url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

         .sidebar{
            width:220px;
            background:#0A1628;
            color:white;
            padding:20px;
            position:fixed;
            height:100%;
        }

        .logo{
            font-size:20px;
            font-weight:bold;
            margin-bottom:30px;
            color:#00B8A9;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            margin:15px 0;
        }

        .sidebar ul li a{
            text-decoration:none;
            color:rgba(255,255,255,0.8);
            display:block;
            padding:10px;
            border-radius:6px;
            transition:0.3s;
        }

        .sidebar ul li a:hover,
        .sidebar ul li a.active{
            background:#00B8A9;
            color:white;
        }

         .main{
            margin-left:220px;
            width:100%;
            padding:30px;
        }

         .appointment-form{
            max-width:900px;
            margin:auto;
            background:rgba(255,255,255,0.97);
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#0A1628;
        }

        .form-row{
            display:flex;
            gap:20px;
            margin-bottom:15px;
        }

        .form-group{
            flex:1;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        textarea{
            resize:vertical;
        }

        .submit-btn{
            width:100%;
            padding:14px;
            background:#00B8A9;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        .submit-btn:hover{
            background:#009688;
        }

        @media(max-width:768px){
            .form-row{
                flex-direction:column;
            }

            .sidebar{
                position:relative;
                width:100%;
                height:auto;
            }

            .main{
                margin-left:0;
            }
        }

    </style>

</head>

<body>

     <div class="sidebar">

        <div class="logo">🏥 Indra Hospital</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="doctors.html">doctors</a></li>
            <li><a href="Gallery.html">Gallery</a></li>
            <li><a href="appointment.html" class="active">Appointment</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </div>

     <div class="main">

        <h1>Book Appointment</h1>

        <form class="appointment-form">

            <div class="form-row">
                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select>
                        <option>Cardiology</option>
                        <option>Neurology</option>
                        <option>Orthopedics</option>
                        <option>Pediatrics</option>
                        <option>General Medicine</option>
                        <option>dentist</option>
                        <option>ophthalmologist</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Doctor</label>
                    <select>
                        <option>Dr. B. Mani Sampreeth Reddy</option>
                        <option>Dr. V.Spandana Reddy</option>
                        <option>Dr. T. Indra Reddy</option>
                        <option>Dr. T. Indu Reddy</option>
                        <option>Dr. M. Priya sharma</option>
                        <option>Dr. B.Maniswar reddy</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Time</label>
                    <input type="time" required>
                </div>

                <div class="form-group">
                    <label>Blood Group</label>
                    <select>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Health Problem</label>
                <textarea rows="4"></textarea>
            </div>

            <button type="submit" class="submit-btn">Book Appointment</button>

        </form>

    </div>

</body>

</html>
